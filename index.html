<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Tennis Tracker</title><style>@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap');*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#f5f0e8;--court:#4a7c59;--net:#2c4a38;--chalk:#fffef9;--ink:#1a1a1a;--muted:#8a8070;--in:#4a7c59;--in-bg:#e8f2eb;--out:#c0392b;--out-bg:#faecea;--maybe:#d4811a;--maybe-bg:#fdf3e3;--pending-bg:#ede8de}body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--ink);min-height:100vh;padding:20px 16px 40px}header{text-align:center;margin-bottom:28px}h1{font-family:'Fraunces',serif;font-weight:600;font-size:2rem;color:var(--net);letter-spacing:-0.5px}.subtitle{font-size:0.72rem;color:var(--muted);margin-top:4px;letter-spacing:0.08em;text-transform:uppercase}.scorebar{display:flex;gap:10px;margin-bottom:20px;justify-content:center}.score-pill{flex:1;max-width:100px;border-radius:8px;padding:10px 6px;text-align:center}.score-pill .num{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:600;line-height:1}.score-pill .lbl{font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;margin-top:3px;opacity:0.8}.pill-in{background:var(--in-bg);color:var(--in)}.pill-out{background:var(--out-bg);color:var(--out)}.pill-maybe{background:var(--maybe-bg);color:var(--maybe)}.pill-pending{background:var(--pending-bg);color:var(--muted)}.week-label{text-align:center;font-size:0.72rem;color:var(--muted);letter-spacing:0.06em;margin-bottom:16px}.msg-section,.add-section{background:var(--chalk);border:1.5px solid #ddd8cc;border-radius:12px;padding:14px;margin-bottom:20px}.msg-section h3,.add-section h3{font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}.msg-box{font-family:'DM Mono',monospace;font-size:0.82rem;line-height:1.5;background:var(--bg);border:1.5px solid #ddd8cc;border-radius:8px;padding:12px;white-space:pre-wrap;word-break:break-word;color:var(--ink)}.copy-btn{font-family:'DM Mono',monospace;font-size:0.72rem;padding:7px 14px;background:var(--bg);color:var(--court);border:1.5px solid var(--court);border-radius:8px;cursor:pointer;margin-top:10px}.copy-btn:active{background:var(--court);color:white}.add-row{display:flex;gap:8px}input[type="text"]{flex:1;font-family:'DM Mono',monospace;font-size:0.85rem;padding:9px 12px;border:1.5px solid #ddd8cc;border-radius:8px;background:var(--bg);color:var(--ink);outline:none}input[type="text"]:focus{border-color:var(--court)}.btn-add{font-family:'DM Mono',monospace;font-size:0.82rem;padding:9px 16px;background:var(--court);color:white;border:none;border-radius:8px;cursor:pointer;white-space:nowrap}.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}.ftab{font-family:'DM Mono',monospace;font-size:0.68rem;padding:5px 12px;border-radius:20px;border:1.5px solid #ddd8cc;background:var(--chalk);cursor:pointer;text-transform:uppercase;color:var(--muted)}.ftab.active{background:var(--net);color:white;border-color:var(--net)}.section-title{font-size:0.66rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}.player-list{display:flex;flex-direction:column;gap:8px}.player-card{background:var(--chalk);border:1.5px solid #ddd8cc;border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px}.player-card.status-in{border-color:var(--in);background:var(--in-bg)}.player-card.status-out{border-color:var(--out);background:var(--out-bg)}.player-card.status-maybe{border-color:var(--maybe);background:var(--maybe-bg)}.player-name{flex:1;font-size:0.9rem;font-weight:500}.status-btns{display:flex;gap:5px}.sbtn{font-family:'DM Mono',monospace;font-size:0.68rem;padding:5px 9px;border-radius:6px;border:1.5px solid transparent;cursor:pointer;font-weight:500}.sbtn-in{background:#d4ead9;color:var(--in);border-color:#b8d9be}.sbtn-maybe{background:#fce8c8;color:var(--maybe);border-color:#f0d0a0}.sbtn-out{background:#f5d4d0;color:var(--out);border-color:#e8b8b2}.sbtn.active-in{background:var(--in);color:white}.sbtn.active-maybe{background:var(--maybe);color:white}.sbtn.active-out{background:var(--out);color:white}.del-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:1rem;padding:2px 4px}.empty-msg{text-align:center;color:var(--muted);font-size:0.78rem;padding:24px 0}.actions{display:flex;justify-content:center;gap:10px;margin-top:20px;flex-wrap:wrap}.btn-reset{font-family:'DM Mono',monospace;font-size:0.72rem;padding:8px 16px;background:none;color:var(--muted);border:1.5px solid #ddd8cc;border-radius:8px;cursor:pointer}</style></head><body><header><h1>Tennis Tracker</h1><div class="subtitle">7:00 AM - Wednesday - Weekly Tracker</div></header><div class="scorebar"><div class="score-pill pill-in"><div class="num" id="cnt-in">0</div><div class="lbl">In</div></div><div class="score-pill pill-maybe"><div class="num" id="cnt-maybe">0</div><div class="lbl">Maybe</div></div><div class="score-pill pill-out"><div class="num" id="cnt-out">0</div><div class="lbl">Out</div></div><div class="score-pill pill-pending"><div class="num" id="cnt-pending">0</div><div class="lbl">Waiting</div></div></div><div class="week-label" id="week-label"></div><div class="msg-section"><h3>Your Weekly Text</h3><div class="msg-box" id="msg-preview"></div><button class="copy-btn" onclick="copyMsg()">Copy to clipboard</button></div><div class="add-section"><h3>Add a Player</h3><div class="add-row"><input type="text" id="name-input" placeholder="New player name..." onkeydown="if(event.key==='Enter')addOne()"><button class="btn-add" onclick="addOne()">+ Add</button></div></div><div class="filters"><button class="ftab active" onclick="setFilter('all',this)">All</button><button class="ftab" onclick="setFilter('pending',this)">Waiting</button><button class="ftab" onclick="setFilter('in',this)">In</button><button class="ftab" onclick="setFilter('maybe',this)">Maybe</button><button class="ftab" onclick="setFilter('out',this)">Out</button></div><div class="section-title" id="list-title"></div><div class="player-list" id="player-list"></div><div class="empty-msg" id="empty-msg" style="display:none">No players in this view.</div><div class="actions"><button class="btn-reset" onclick="resetStatuses()">Reset replies (new week)</button><button class="btn-reset" onclick="clearAll()">Clear all players</button></div><script>var L="https://boatcarpet.github.io/tennis-tracker/";var NL=String.fromCharCode(10);var N=["Sandeep Badhwar","Mitch Black","Jeff Drejza","Jim Dyla","Mats Elmaster","Michael Fishman","John Ford","Jeffery Imerman","Jim Johns","Nick Junttila","Jim Lareau","Arnaud Mangin","Paul Mareski","Kevin Meade","James Moran","Michael Ouaknine","Andy Rifkin","Peter G. Root","Ken Sachs","Steven Schimpke","Jeffrey Stafeil"];function load(){try{var s=localStorage.getItem("tw7");if(s)return JSON.parse(s);}catch(e){}return N.map(function(n,i){return{id:i+1,name:n,status:"pending"};});}var players=load();var flt="all";function save(){try{localStorage.setItem("tw7",JSON.stringify(players));}catch(e){}}function nextWed(){var d=new Date();var n=(3-d.getDay()+7)%7||7;var w=new Date(d);w.setDate(d.getDate()+n);return w.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});}function counts(){var c={in:0,out:0,maybe:0,pending:0};players.forEach(function(p){c[p.status]++;});document.getElementById("cnt-in").textContent=c.in;document.getElementById("cnt-out").textContent=c.out;document.getElementById("cnt-maybe").textContent=c.maybe;document.getElementById("cnt-pending").textContent=c.pending;}function setFilter(f,el){flt=f;document.querySelectorAll(".ftab").forEach(function(t){t.classList.remove("active");});el.classList.add("active");render();}function setStatus(id,st){var p=players.find(function(x){return x.id===id;});if(!p)return;p.status=(p.status===st)?"pending":st;save();render();}function delPlayer(id){if(!confirm("Remove player?"))return;players=players.filter(function(x){return x.id!==id;});save();render();}function render(){counts();var list=flt==="all"?players:players.filter(function(p){return p.status===flt;});var t={all:"All Players",pending:"Waiting",in:"Playing",out:"Cannot Make It",maybe:"Maybe"};document.getElementById("list-title").textContent=t[flt]+" ("+list.length+")";var empty=document.getElementById("empty-msg");var el=document.getElementById("player-list");if(list.length===0){el.innerHTML="";empty.style.display="block";return;}empty.style.display="none";el.innerHTML=list.map(function(p){return "<div class='player-card status-"+p.status+"'><div class='player-name'>"+p.name+"</div><div class='status-btns'><button class='sbtn sbtn-in "+(p.status==="in"?"active-in":"")+"' onclick='setStatus("+p.id+","in")'>IN</button><button class='sbtn sbtn-maybe "+(p.status==="maybe"?"active-maybe":"")+"' onclick='setStatus("+p.id+","maybe")'>?</button><button class='sbtn sbtn-out "+(p.status==="out"?"active-out":"")+"' onclick='setStatus("+p.id+","out")'>OUT</button></div><button class='del-btn' onclick='delPlayer("+p.id+")'>x</button></div>";}).join("");}function addOne(){var inp=document.getElementById("name-input");var n=inp.value.trim();if(!n)return;players.push({id:Date.now(),name:n,status:"pending"});save();render();inp.value="";inp.focus();}function resetStatuses(){if(!confirm("Reset all replies?"))return;players.forEach(function(p){p.status="pending";});save();render();}function clearAll(){if(!confirm("Remove ALL players?"))return;players=[];save();render();}function copyMsg(){navigator.clipboard.writeText(document.getElementById("msg-preview").textContent).then(function(){var b=document.querySelector(".copy-btn");b.textContent="Copied!";setTimeout(function(){b.textContent="Copy to clipboard";},2000);});}var w=nextWed();document.getElementById("week-label").textContent="Next up: "+w;document.getElementById("msg-preview").textContent="Hey team! Tennis this Wednesday ("+w+") at 7am!"+NL+NL+"Tap here - IN, MAYBE or OUT:"+NL+L+NL+NL+"See you on the court!";render();</script></body></html>
